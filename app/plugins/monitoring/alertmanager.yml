route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  # Default receiver is "email-notifications"
  receiver: 'email-notifications'

  routes:
    # Sub-route for severity=critical
    - match:
        severity: 'critical'
      receiver: 'pagerduty'

    # Sub-route for severity=warning
    - match:
        severity: 'warning'
      receiver: 'slack-notifications'

    # Sub-route for alertname=IntrusionDetected
    - match:
        alertname: 'IntrusionDetected'
      receiver: 'soc-team'
      group_by: [service]

    - match:
        alertname: "CryptoHealthCheckFailed"
      receiver: "devops-team"

# Receivers
receivers:
  - name: 'email-notifications'
    email_configs:
      - to: 'admin@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'smtp.example.com:587'
        username: 'alertmanager'
        auth_identity: 'alertmanager'
        auth_password: 'password'

  - name: 'pagerduty'
    webhook_configs:
      - url: 'https://kaapi.example.com/alert-webhook'
        send_resolved: true

  - name: 'slack-notifications'
    webhook_configs:
      - url: 'https://kaapi.example.com/slack-alerts'
        send_resolved: true

  - name: 'soc-team'
    webhook_configs:
      - url: 'https://kaapi.example.com/soc-alerts'
        send_resolved: true

  - name: 'devops-team'
    webhook_configs:
      - url: 'https://kaapi.example.com/devops-alerts'
        send_resolved: true
