version: '3.7'

services:
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:postgres@kaapi-db:5432/postgres?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - kaapi-network

networks:
  kaapi-network:
    external: true
