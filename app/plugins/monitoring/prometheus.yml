# prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - "alerts.yml"
  - "recording-rules.yml"

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093

scrape_configs:
  - job_name: 'kaapi-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kaapi-api:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'kaapi-api'

  - job_name: 'kaapi-audit'
    metrics_path: '/api/advanced_audit/metrics'
    static_configs:
      - targets: ['kaapi-api:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'kaapi-audit'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'
