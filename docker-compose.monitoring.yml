# This file extends your main docker-compose with the monitoring services
services:
  # IMPORTANT (MODIFICATION 1): On ajoute le service 'api' ici
  # uniquement pour le connecter au réseau de monitoring.
  # Docker Compose fusionnera cette configuration avec celle du fichier principal.
  api:
    networks:
      - kaapi-network
      - monitoring-network

  # IMPORTANT (MODIFICATION 2): Le service 'metrics' est redéfini ici.
  # La directive "build: ." a été RETIRÉE pour ne pas déclencher un build inutile.
  # On lui dit d'utiliser l'image que l'on a déjà construite.
  metrics:
    image: kaapi-app:latest # On utilise l'image déjà construite, PAS DE BUILD ICI !
    container_name: kaapi-metrics
    command: python app/metrics_server.py
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    networks:
      - kaapi-network
      - monitoring-network

  # ------------------------------------------------------------------
  # Les services de monitoring ci-dessous ne changent pas.
  # Ils utilisent déjà des images publiques et sont corrects.
  # ------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./app/plugins/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - monitoring-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./app/plugins/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./app/plugins/monitoring/alerts.yml:/etc/prometheus/alerts.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - monitoring-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana-enterprise:latest
    ports:
      - "3002:3000"
    volumes:
      - ./app/plugins/monitoring/grafana-provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./app/plugins/monitoring/grafana-provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./app/plugins/monitoring/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - monitoring-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - monitoring-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app/plugins/monitoring/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring-network
    restart: unless-stopped
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - monitoring-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - monitoring-network
    restart: unless-stopped

networks:
  # IMPORTANT (MODIFICATION 3): On déclare que kaapi-network est "externe".
  # Cela signifie que ce fichier ne le crée pas, mais s'attend à ce
  # que le fichier docker-compose.yml principal l'ait déjà créé.
  kaapi-network:
    external: true
  
  # Ce réseau est propre à la stack de monitoring, sa définition est correcte.
  monitoring-network:
    driver: bridge