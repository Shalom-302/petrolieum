version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kaapi-app:latest
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kaapi
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      PYTHONUNBUFFERED: 1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db
      - redis
    networks:
      - dokploy-network

  celery:
    image: kaapi-app:latest
    restart: always
    command: python -m celery -A app.core.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kaapi
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      - api
      - db
      - redis
    networks:
      - dokploy-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kaapi
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - dokploy-network

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true