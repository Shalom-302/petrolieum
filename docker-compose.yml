version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kaapi-app:latest
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kaapi
      # AJOUT de l'URL ASYNC pour ton CRUD pétrole
      ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/kaapi
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      PYTHONUNBUFFERED: 1
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy # MODIFIÉ : On attend que Vault soit vraiment prêt
      minio:
        condition: service_healthy # MODIFIÉ : On attend le healthcheck Minio
    networks:
      - dokploy-network

  celery:
    image: kaapi-app:latest
    restart: always
    command: python -m celery -A app.core.celery worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kaapi
      ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/kaapi
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - dokploy-network

  metrics:
    image: kaapi-app:latest
    restart: always
    command: python app/metrics_server.py
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    networks:
      - dokploy-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kaapi
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kaapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:latest
    restart: always
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      # AJOUT : Autorise la persistance même en mode DEV si on utilise un volume
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/file # AJOUT : Pour que tes clés ne s'effacent pas au rebuild
    networks:
      - dokploy-network
    healthcheck: # AJOUT : Pour que l'API n'essaie pas de lire les clés trop tôt
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s # Réduit pour plus de rapidité
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  vault_data: # AJOUT : Volume pour Vault

networks:
  dokploy-network:
    external: true